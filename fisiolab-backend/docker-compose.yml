services:
  postgres:
    image: postgres:15-alpine
    container_name: fisiolab_postgres
    environment:
      POSTGRES_DB: fisiolab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: magic
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d fisiolab']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fisiolab_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fisiolab_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fisiolab.com
      PGADMIN_DEFAULT_PASSWORD: magic
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
